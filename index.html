<!-- ===================== APP CHROME (always active) ===================== -->
<style id="app-style">
  :root{ --tb:#11141b; --tb-line:#262b35; --tb-ink:#e6e9ef; --tb-muted:#8b93a3; --tb-accent:#2563eb; }
  *{box-sizing:border-box;}
  #toolbar{
    position:fixed;top:0;left:0;right:0;height:56px;z-index:1000;
    background:var(--tb);border-bottom:1px solid var(--tb-line);
    display:flex;align-items:center;gap:16px;padding:0 18px;
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  #toolbar .brand{font-weight:800;font-size:15px;color:var(--tb-ink);letter-spacing:-.2px;white-space:nowrap;}
  #toolbar .brand span{color:var(--tb-accent);}
  #toolbar .group{display:flex;gap:6px;}
  #toolbar .seg{
    background:#1b1f28;border:1px solid var(--tb-line);color:var(--tb-muted);
    font-size:12.5px;font-weight:600;padding:7px 12px;border-radius:8px;cursor:pointer;white-space:nowrap;
    transition:all .12s;
  }
  #toolbar .seg:hover{color:var(--tb-ink);border-color:#3a4250;}
  #toolbar .seg.active{background:var(--tb-accent);color:#fff;border-color:var(--tb-accent);}
  #toolbar .spacer{flex:1;}
  #toolbar .btn{
    font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:8px;cursor:pointer;white-space:nowrap;
    border:1px solid var(--tb-line);background:#1b1f28;color:var(--tb-ink);transition:all .12s;
  }
  #toolbar .btn:hover{border-color:#3a4250;}
  #toolbar .btn.primary{background:var(--tb-accent);border-color:var(--tb-accent);color:#fff;}
  #toolbar .btn.primary:hover{filter:brightness(1.08);}
  #toolbar .btn.on{background:#10331f;border-color:#1f7a45;color:#7be0a4;}
  #preview{padding:78px 12px 36px;min-height:100vh;}
  #hint{
    position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:900;
    background:rgba(17,20,27,.92);color:#aeb6c4;border:1px solid var(--tb-line);
    font-family:'Inter',sans-serif;font-size:11.5px;padding:7px 14px;border-radius:20px;
    box-shadow:0 6px 20px rgba(0,0,0,.3);pointer-events:none;
  }
  @media (max-width:760px){
    #toolbar{flex-wrap:wrap;height:auto;padding:8px 12px;gap:8px;}
    #preview{padding-top:108px;}
  }
  @media print{
    #toolbar,#hint{display:none !important;}
    #preview{padding:0 !important;}
    html,body{background:#fff !important;}
  }
</style>

  .bullets b{color:var(--ink);font-weight:600;}

/* ============================ RENDERERS ============================ */
const C = RESUME.contact;

function render_sidebar(d){
  const chips = (arr)=>arr.map(s=>`<span class="chip">${s}</span>`).join("");
  const skillBlocks = Object.entries(d.skills).map(([cat,arr])=>
    `<div class="skill-cat">${cat}</div><div class="chips">${chips(arr)}</div>`).join("");
  const edu = d.education.map(e=>
    `<div class="edu-item"><div class="edu-deg">${e.degree}</div><div class="edu-school">${e.school}</div><div class="edu-meta">${e.date} · GPA ${e.gpa}</div></div>`).join("");
  const jobs = d.experience.map(j=>
    `<div class="job"><div class="job-top"><div class="job-title">${j.title} · <span class="job-co">${j.company}</span></div><div class="job-date">${j.date}</div></div>
      <ul class="bullets">${j.bullets.map(b=>`<li>${b}</li>`).join("")}</ul></div>`).join("");
  const pubs = d.publications.filter(p=>p.core).map(p=>
    `<div class="pub"><span class="t">${p.title}</span> — <span class="v">${p.venue}</span>${p.note?`, ${p.note}`:""}.</div>`).join("");
  const projs = d.projects.map(p=>
    `<div class="proj"><span class="pn">${p.name}</span> — <span class="pd">${p.desc}</span></div>`).join("");
  return `<div class="page">
    <aside class="sidebar">
      <div class="name">${d.name}</div>
      <div class="role">${d.title}</div>
      <div class="sb-block"><div class="sb-title">Contact</div>
        <div class="contact-row"><span class="lbl">✉</span><a href="mailto:${C.email}">${C.email}</a></div>
        <div class="contact-row"><span class="lbl">⌖</span><span>${C.location}</span></div>
        <div class="contact-row"><span class="lbl">⊕</span><a href="${C.websiteUrl}">${C.website}</a></div>
        <div class="contact-row"><span class="lbl">in</span><a href="${C.linkedinUrl}">${C.linkedin}</a></div>
        <div class="contact-row"><span class="lbl">gh</span><a href="${C.githubUrl}">${C.github}</a></div>
      </div>
      <div class="sb-block"><div class="sb-title">Skills</div>${skillBlocks}</div>
      <div class="sb-block"><div class="sb-title">Education</div>${edu}</div>
    </aside>
    <main class="main">
      <p class="summary">${d.summary}</p>
      <section class="sec"><div class="sec-head"><h2>Experience</h2><div class="bar"></div></div>${jobs}</section>
      <section class="sec"><div class="sec-head"><h2>Selected Publications</h2><div class="bar"></div></div>${pubs}</section>
      <section class="sec"><div class="sec-head"><h2>Selected Projects</h2><div class="bar"></div></div>${projs}</section>
    </main>
  </div>`;
}

function render_classic(d){
  const contact = `<a href="mailto:${C.email}">${C.email}</a><span class="dot">•</span>`+
    `<span>${C.location}</span><span class="dot">•</span>`+
    `<a href="${C.websiteUrl}">${C.website}</a><span class="dot">•</span>`+
    `<a href="${C.linkedinUrl}">${C.linkedin}</a><span class="dot">•</span>`+
    `<a href="${C.githubUrl}">${C.github}</a>`;
  const jobs = d.experience.map(j=>
    `<div class="entry"><div class="entry-head"><div class="entry-title">${j.title}, <span class="entry-org">${j.company}</span></div><div class="entry-date">${j.date}</div></div>
      <ul class="bullets">${j.bullets.map(b=>`<li>${b}</li>`).join("")}</ul></div>`).join("");
  const edu = d.education.map(e=>
    `<div class="edu-line"><div class="d">${e.degree} <span style="font-weight:600;color:var(--light);">· GPA ${e.gpa}</span></div><div class="s">${e.school}</div><div class="m">${e.date}</div></div>`).join("");
  const pubs = d.publications.map(p=>
    `<li><span class="t">${p.title}</span> — <span class="v">${p.venue}</span>${p.note?` (${p.note})`:""}.</li>`).join("");
  const skills = Object.entries(d.skills).map(([cat,arr])=>
    `<div><span class="k">${cat}:</span> ${arr.join(", ")}</div>`).join("");
  return `<div class="page">
    <header><div class="name">${d.name}</div><div class="role">${d.title.replace("AI/ML","AI / ML")}</div><div class="contact">${contact}</div></header>
    <section><h2>Summary</h2><p class="summary">${d.summary}</p></section>
    <section><h2>Professional Experience</h2>${jobs}</section>
    <section><h2>Education</h2><div class="two-col">${edu}</div></section>
    <section><h2>Selected Publications</h2><ul class="pub">${pubs}</ul></section>
    <section><h2>Technical Skills</h2><div class="skills-grid">${skills}</div></section>
  </div>`;
}

function render_tech(d){
  const km = {"Languages":"lang","ML Lifecycle":"ml","On-Device &amp; Web":"web","Domains":"domains"};
  const jobs = d.experience.map(j=>
    `<div class="job"><div class="job-head"><div class="job-title">${j.title} · <span class="job-co">${j.company}</span></div><div class="job-date">${j.date}</div></div>
      <ul class="bullets">${j.bullets.map(b=>`<li>${b}</li>`).join("")}</ul></div>`).join("");
  const edu = d.education.map(e=>
    `<div class="edu"><div class="d">${e.degree}</div><div class="s">${e.shortSchool} · GPA ${e.gpa}</div><div class="m">${e.date}</div></div>`).join("");
  const skills = Object.entries(d.skills).map(([cat,arr])=>
    `<div class="skill-row"><div class="k">${km[cat]||cat}</div><div class="v">${arr.join(", ")}</div></div>`).join("");
  const pubs = d.publications.filter(p=>p.core).map(p=>
    `<div class="pub"><span class="t">${p.title}</span> — <span class="v">${p.venue}</span>${p.note?`, ${p.note}`:""}.</div>`).join("");
  return `<div class="page">
    <header><div><div class="name">${d.name}</div><div class="role">${d.title}</div></div>
      <div class="contact">
        <div><span class="k">email</span> <a href="mailto:${C.email}">${C.email}</a></div>
        <div><span class="k">loc&nbsp;&nbsp;</span> ${C.location}</div>
        <div><span class="k">web&nbsp;&nbsp;</span> <a href="${C.websiteUrl}">${C.website}</a></div>
        <div><span class="k">li&nbsp;&nbsp;&nbsp;</span> <a href="${C.linkedinUrl}">${C.linkedin}</a></div>
        <div><span class="k">git&nbsp;&nbsp;</span> <a href="${C.githubUrl}">${C.github}</a></div>
      </div>
    </header>
    <p class="summary">${d.summary}</p>
    <section><h2>Experience<span class="ln"></span></h2>${jobs}</section>
    <div class="grid2">
      <section><h2>Education<span class="ln"></span></h2>${edu}</section>
      <section><h2>Skills<span class="ln"></span></h2>${skills}</section>
    </div>
    <section><h2>Selected Publications<span class="ln"></span></h2>${pubs}</section>
  </div>`;
}

const DESIGNS = {
  sidebar: { label:"Modern Sidebar", render:render_sidebar, file:"Ho-Ko-Resume-Modern-Sidebar" },
  classic: { label:"Classic Professional", render:render_classic, file:"Ho-Ko-Resume-Classic-Professional" },
  tech:    { label:"Tech Minimal", render:render_tech, file:"Ho-Ko-Resume-Tech-Minimal" }
};

/* ============================ APP LOGIC ============================ */
let current = "sidebar";
let editing = false;

function applyDesign(key){
  current = key;
  document.querySelectorAll("style.design-css").forEach(s=>{
    s.media = (s.dataset.key === key) ? "all" : "not all";
  });
  document.getElementById("preview").innerHTML = DESIGNS[key].render(RESUME);
  document.querySelectorAll("#design-tabs .seg").forEach(b=>b.classList.toggle("active", b.dataset.d===key));
  if(editing) setEditable(true);
  try{ history.replaceState(null,"", "?d="+key); }catch(e){}
}

function setEditable(on){
  editing = on;
  const page = document.querySelector("#preview .page");
  if(page){ page.contentEditable = on ? "true" : "false"; page.style.outline = on ? "2px dashed #2563eb" : "none"; }
  const btn = document.getElementById("btn-edit");
  btn.classList.toggle("on", on);
  btn.textContent = on ? "Editing ✓" : "Edit text";
}

document.getElementById("design-tabs").addEventListener("click", e=>{
  const b = e.target.closest(".seg"); if(b) applyDesign(b.dataset.d);
});
document.getElementById("btn-edit").addEventListener("click", ()=> setEditable(!editing));
document.getElementById("btn-print").addEventListener("click", ()=>{ setEditable(false); window.print(); });
document.getElementById("btn-download").addEventListener("click", ()=>{
  setEditable(false);
  const page = document.querySelector("#preview .page");
  if(!page || !window.html2pdf){ window.print(); return; }
  html2pdf().set({
    margin:0,
    filename: DESIGNS[current].file + ".pdf",
    image:{ type:"jpeg", quality:0.98 },
    html2canvas:{ scale:3, useCORS:true, backgroundColor:"#ffffff" },
    jsPDF:{ unit:"in", format:"letter", orientation:"portrait" },
    pagebreak:{ mode:["css","legacy"] }
  }).from(page).save();
});

// initial design from ?d= param
const params = new URLSearchParams(location.search);
applyDesign(DESIGNS[params.get("d")] ? params.get("d") : "sidebar");
</script>
