<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Builder — Ho Ko</title>
<meta name="description" content="A browser-based resume builder with multiple award-winning-style designs and one-click US Letter PDF export.">
<meta name="theme-color" content="#0f1218">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f1218'/%3E%3Crect x='7' y='6' width='18' height='3' rx='1.5' fill='%232563eb'/%3E%3Crect x='7' y='12' width='18' height='2' rx='1' fill='%23e7eaf0'/%3E%3Crect x='7' y='17' width='13' height='2' rx='1' fill='%238b93a3'/%3E%3Crect x='7' y='22' width='16' height='2' rx='1' fill='%238b93a3'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css">
<!-- Active template's stylesheet is injected here at runtime -->
<style id="tpl-style"></style>
</head>
<body>
  <div id="toolbar">
    <div class="brand">Resume<span>Builder</span></div>
    <div class="tpl-picker">
      <button class="nav-btn" id="nav-prev" title="Previous design" aria-label="Previous design">‹</button>
      <select id="tpl-select" aria-label="Choose a design"></select>
      <button class="nav-btn" id="nav-next" title="Next design" aria-label="Next design">›</button>
      <span class="tpl-desc" id="tpl-desc"></span>
    </div>
    <div class="spacer"></div>
    <button class="btn" id="btn-arrange">⠿ Arrange</button>
    <button class="btn" id="btn-editor">✦ Editor</button>
    <button class="btn" id="btn-edit">Edit text</button>
    <button class="btn" id="btn-download">Download PDF</button>
    <button class="btn primary" id="btn-print">Save as PDF</button>
  </div>

  <noscript><div style="max-width:520px;margin:100px auto;padding:20px;background:#fff;border-radius:10px;font-family:sans-serif;">This resume builder runs entirely in your browser and needs JavaScript enabled.</div></noscript>
  <div id="preview"><div id="stage"></div></div>
  <div id="fit-badge"></div>
  <div id="hint">Tip: <b>Save as PDF</b> is sharpest — choose paper <b>Letter</b>, margins <b>None</b>, enable <b>Background graphics</b>.</div>

  <!-- PDF export: html2canvas (raster capture) + jsPDF (assemble), used directly
       so the output is a single, exactly-Letter, non-empty page.
       Vendored locally (MIT) so Download PDF works without any CDN. -->
  <script src="js/vendor/html2canvas.min.js"></script>
  <script src="js/vendor/jspdf.umd.min.js"></script>

  <!-- Data + state + on-device LLM + registry -->
  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/llm.js"></script>
  <script src="js/registry.js"></script>

  <!-- Templates (each self-registers; add a new file here to add a design) -->
  <script src="js/templates/01-modern-sidebar.js"></script>
  <script src="js/templates/02-classic.js"></script>
  <script src="js/templates/03-tech-minimal.js"></script>
  <script src="js/templates/04-executive.js"></script>
  <script src="js/templates/05-swiss.js"></script>
  <script src="js/templates/06-timeline.js"></script>
  <script src="js/templates/07-compact.js"></script>
  <script src="js/templates/08-banner.js"></script>
  <script src="js/templates/09-elegant.js"></script>

  <!-- Editor + app logic (last) -->
  <script src="js/editor.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
